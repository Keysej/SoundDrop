<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundDrop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <header>
      <h1>SoundDrop</h1>
      <p class="subtitle">Ephemeral sound research</p>
    </header>

    <!-- Theme + countdown -->
    <div class="theme-card">
      <div class="theme-header">
        <div class="theme-text">
          <p class="theme-label">Today's Theme</p>
          <h2 id="theme-title">Loading...</h2>
          <p id="theme-description" class="theme-desc"></p>
        </div>
        <div class="countdown-box">
          <div class="countdown-time" id="countdown">--:--:--</div>
          <div class="countdown-label">until sounds disappear</div>
        </div>
      </div>
      <div class="stats-bar">
        <span><strong id="stat-drops">0</strong> drops</span>
        <span><strong id="stat-applauds">0</strong> applauds</span>
        <span><strong id="stat-comments">0</strong> comments</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <button class="btn-record" id="btn-record">
        <i class="fa-solid fa-microphone"></i> Record
      </button>
      <button class="btn-upload" id="btn-upload">
        <i class="fa-solid fa-upload"></i> Upload
      </button>
      <button class="btn-link" id="btn-link">
        <i class="fa-solid fa-link"></i> Share Link
      </button>
      <input type="file" id="file-input" accept="audio/*" style="display:none">
    </div>

    <!-- Recording panel -->
    <div class="panel" id="recording-panel" style="display:none">
      <div class="panel-inner">
        <div class="recording-status" id="recording-status">
          <span class="live-dot"></span>
          <span id="recording-timer">00:00</span>
          <button class="btn-stop" id="btn-stop">
            <i class="fa-solid fa-stop"></i> Stop
          </button>
        </div>
        <textarea id="record-context" placeholder="Add a note about this sound (optional)..."></textarea>
        <div id="preview-area" style="display:none">
          <audio id="preview-audio" controls></audio>
          <div class="panel-actions">
            <button class="btn-secondary" id="btn-rerecord">
              <i class="fa-solid fa-redo"></i> Re-record
            </button>
            <button class="btn-primary" id="btn-share-recording">
              <i class="fa-solid fa-share"></i> Share
            </button>
          </div>
        </div>
        <button class="btn-cancel" id="btn-cancel-record">Cancel</button>
      </div>
    </div>

    <!-- Link panel -->
    <div class="panel" id="link-panel" style="display:none">
      <div class="panel-inner">
        <h3><i class="fa-solid fa-link"></i> Share an Audio Link</h3>
        <input type="url" id="link-url" placeholder="Paste audio URL (YouTube, SoundCloud, Spotify...)">
        <textarea id="link-context" placeholder="How does this relate to today's theme? (optional)"></textarea>
        <div class="panel-actions">
          <button class="btn-secondary" id="btn-cancel-link">Cancel</button>
          <button class="btn-primary" id="btn-share-link">Share</button>
        </div>
      </div>
    </div>

    <!-- Drops list -->
    <div id="drops-list"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
